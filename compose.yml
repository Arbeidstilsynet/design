services:
  storybook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gnist-storybook
    ports:
      - "6006:6006"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:6006/",
        ]
      timeout: 3s
      start_period: 5s
