packages:
  - packages/*
  - apps/*
  - tools/*

allowBuilds:
  esbuild: false

autoInstallPeers: false

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - oxlint
  - "@oxlint/*"
  - oxfmt
  - "@oxfmt/*"
  - fast-uri@3.1.2

trustPolicy: no-downgrade

trustPolicyExclude:
  - rxjs@7.8.2
  - semver@6.3.1
