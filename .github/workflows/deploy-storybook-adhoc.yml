name: Deploy Storybook ad hoc to Nais

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  validate_branch:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Block main branch deploys
        if: github.ref == 'refs/heads/main'
        run: |
          echo "::error::Ad hoc Storybook deploys must be run from a feature branch, not main."
          exit 1

  deploy_demo:
    needs: validate_branch
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-storybook-nais.yml
    with:
      cluster: dev
      vars: .nais/vars-demo.yml
      workload_name: gnist-storybook-demo
