name: Generate changeset for Renovate

on:
  pull_request:
    paths:
      - ".github/workflows/changesets-renovate.yml"
      - "**/pnpm-lock.yaml"
      - "**/package.json"

jobs:
  generate-changeset:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'renovate[bot]' && github.repository == 'Arbeidstilsynet/design'
    steps:
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          client-id: ${{ vars.BETZY_BOT_CLIENT_ID }}
          private-key: ${{ secrets.BETZY_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 10
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set git user
        run: |
          git config --global user.name "${{ vars.BETZY_BOT_GIT_USER_NAME }}"
          git config --global user.email "${{ vars.BETZY_BOT_GIT_USER_EMAIL }}"

      - uses: Arbeidstilsynet/action-pnpm-setup@72d8b6a4a6492697599795caf6bf6d3862474946 # v1
        with:
          skip-audit: true

      - name: Generate changesets
        run: pnpm exec changesets-renovate
        env:
          SKIP_COMMIT: "TRUE"
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Filter devDependency-only changesets
        run: pnpm exec tsx scripts/filter-renovate-changesets.ts

      - name: Commit and push changesets
        run: |
          git add .changeset
          if git diff --cached --quiet; then
            echo "No changesets to commit"
          else
            git commit -m "chore: add changeset for renovate"
            git push
          fi
