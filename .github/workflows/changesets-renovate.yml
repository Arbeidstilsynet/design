name: Generate changeset for Renovate

on:
  pull_request:
    paths:
      - ".github/workflows/changesets-renovate.yml"
      - "**/pnpm-lock.yaml"
      - "**/package.json"

jobs:
  generate-changeset:
    runs-on: ubuntu-latest
    if: github.event.sender.login == 'renovate[bot]' && github.repository == 'Arbeidstilsynet/design'
    steps:
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.BETZY_BOT_CLIENT_ID }}
          private-key: ${{ secrets.BETZY_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 10
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set git user
        run: |
          git config --global user.name "${{ vars.BETZY_BOT_GIT_USER_NAME }}"
          git config --global user.email "${{ vars.BETZY_BOT_GIT_USER_EMAIL }}"

      - uses: Arbeidstilsynet/action-pnpm-setup@29e998b7fdd9fd84ae8a6c2521e1a811bd246122 # v1
        with:
          skip-audit: true
          skip-install: true

      - name: Install root dependencies only
        run: pnpm install --ignore-scripts --filter root

      - name: Generate changesets
        run: pnpm exec changesets-renovate
        env:
          SKIP_COMMIT: "TRUE"
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Filter devDependency-only changesets
        run: pnpm exec tsx scripts/filter-renovate-changesets.ts

      - name: Commit and push changesets
        run: |
          git add .changeset
          if git diff --cached --quiet; then
            echo "No changesets to commit"
          else
            git commit -m "chore: add changeset for renovate"
            git push
          fi
