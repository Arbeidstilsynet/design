name: Deploy Storybook preview

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy_dev:
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-storybook-nais.yml
    with:
      cluster: dev
      vars: .nais/vars-dev.yml
      workload_name: gnist-storybook
