name: Deploy Storybook prod (manual)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy_prod:
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy-storybook-nais.yml
    with:
      cluster: prod
      vars: .nais/vars-prod.yml
